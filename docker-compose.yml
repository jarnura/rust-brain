# =============================================================================
# rust-brain — Docker Compose
# =============================================================================
# Production-grade Rust code intelligence platform
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # DATABASE LAYER
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: rustbrain-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [rustbrain-net]
    deploy:
      resources:
        limits:
          memory: 2G

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: rustbrain-pgweb
    ports:
      - "${PGWEB_PORT:-8081}:8081"
    environment:
      PGWEB_DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [rustbrain-net]

  neo4j:
    image: neo4j:5-community
    container_name: rustbrain-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./configs/neo4j/neo4j.conf:/conf/neo4j.conf
      - ./scripts/init-neo4j.cypher:/var/lib/neo4j/import/init.cypher
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_PLUGINS: '["apoc"]'
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks: [rustbrain-net]
    deploy:
      resources:
        limits:
          memory: 4G

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rustbrain-qdrant
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__ENABLE_TLS: "false"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      rustbrain-net:
        aliases:
          - qdrant
    deploy:
      resources:
        limits:
          memory: 4G

  # ---------------------------------------------------------------------------
  # AI / ML LAYER
  # ---------------------------------------------------------------------------

  ollama:
    image: ollama/ollama:latest
    container_name: rustbrain-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      rustbrain-net:
        aliases:
          - ollama
    deploy:
      resources:
        limits:
          memory: 8G
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # OBSERVABILITY LAYER
  # ---------------------------------------------------------------------------

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: rustbrain-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [rustbrain-net]

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: rustbrain-node-exporter
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    restart: unless-stopped
    networks: [rustbrain-net]

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rustbrain-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres-exporter
      - node-exporter
    restart: unless-stopped
    networks: [rustbrain-net]

  grafana:
    image: grafana/grafana:11.0.0
    container_name: rustbrain-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-rustbrain}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    depends_on:
      - prometheus
    restart: unless-stopped
    networks: [rustbrain-net]

  # ---------------------------------------------------------------------------
  # API LAYER
  # ---------------------------------------------------------------------------

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: rustbrain-api
    ports:
      - "${API_PORT:-8088}:8080"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      QDRANT_HOST: http://qdrant:6333
      QDRANT_COLLECTION: code_embeddings
      OLLAMA_HOST: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      RUST_LOG: ${RUST_LOG:-info,rustbrain_api=debug}
      API_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks: [rustbrain-net]
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # MCP LAYER
  # ---------------------------------------------------------------------------

  mcp:
    build:
      context: ./services/mcp
      dockerfile: Dockerfile
    container_name: rustbrain-mcp
    environment:
      API_BASE_URL: http://api:8080
      RUST_LOG: ${RUST_LOG:-info,rustbrain_mcp=debug}
      MCP_TRANSPORT: stdio
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [rustbrain-net]
    deploy:
      resources:
        limits:
          memory: 256M
    # MCP server uses stdio, so we don't expose ports
    # To use: docker exec -i rustbrain-mcp rustbrain-mcp

  # ---------------------------------------------------------------------------
  # INGESTION LAYER
  # ---------------------------------------------------------------------------

  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: rustbrain-ingestion
    volumes:
      - ${INGEST_TARGET_PATH:-./target-repo}:/workspace/target-repo:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WORKSPACE_PATH: /workspace/target-repo
      RUST_LOG: ${RUST_LOG:-info,rustbrain_ingestion=debug}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [rustbrain-net]
    profiles:
      - ingestion

# ---------------------------------------------------------------------------
# NETWORKS & VOLUMES
# ---------------------------------------------------------------------------

networks:
  rustbrain-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  ollama_data:
  prometheus_data:
  grafana_data:
