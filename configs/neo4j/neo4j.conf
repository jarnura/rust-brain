# =============================================================================
# rust-brain — Neo4j Configuration
# =============================================================================

# Memory settings
server.memory.heap.initial_size=4G
server.memory.heap.max_size=4G
server.memory.pagecache.size=2G

# Network
server.default_listen_address=0.0.0.0
server.bolt.listen_address=:7687
server.http.listen_address=:7474

# APOC plugin — explicit allowlist (defense-in-depth for RUSA-198)
# Planner-reentry procedures (apoc.cypher.run*, apoc.do.*, apoc.when, apoc.case,
# apoc.periodic.*, apoc.trigger.*) are excluded to prevent workspace label bypass.
dbms.security.procedures.unrestricted=apoc.path.*,apoc.algo.*,apoc.coll.*,apoc.text.*,apoc.map.*,apoc.convert.*,apoc.date.*,apoc.meta.*,apoc.util.*,apoc.graph.*,apoc.help,apoc.version
dbms.security.procedures.allowlist=apoc.path.*,apoc.algo.*,apoc.coll.*,apoc.text.*,apoc.map.*,apoc.convert.*,apoc.date.*,apoc.meta.*,apoc.util.*,apoc.graph.*,apoc.help,apoc.version

# Import directory
dbms.directories.import=/var/lib/neo4j/import
