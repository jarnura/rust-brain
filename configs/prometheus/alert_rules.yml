# =============================================================================
# rust-brain — Prometheus Alert Rules
# =============================================================================

groups:
  - name: rustbrain-consistency
    rules:
      - alert: ConsistencyCheckFailed
        expr: probe_http_status_code{probe="consistency"} == 503
        for: 2m
        labels:
          severity: critical
          component: consistency
        annotations:
          summary: "Cross-store consistency check failed"
          description: |
            The /health/consistency endpoint is returning HTTP 503, indicating
            data inconsistencies between Postgres, Neo4j, and Qdrant.
            Check the consistency report at http://localhost:8088/api/consistency
            and follow the recovery steps in docs/runbook.md.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-store-consistency-failure"

      - alert: ConsistencyProbeUnreachable
        expr: probe_success{probe="consistency"} == 0
        for: 5m
        labels:
          severity: warning
          component: consistency
        annotations:
          summary: "Consistency health endpoint unreachable"
          description: |
            The /health/consistency endpoint cannot be reached by the
            blackbox exporter probe. The API service may be down or
            the endpoint is not responding.

  - name: rustbrain-workspace-leak
    rules:
      - alert: CrossWorkspaceLeakDetected
        expr: rustbrain_workspace_leak_multi_label_nodes > 0
        for: 1m
        labels:
          severity: critical
          component: workspace-isolation
        annotations:
          summary: "Cross-workspace contamination detected in Neo4j"
          description: |
            {{ $value }} node(s) have multiple Workspace_ labels, indicating
            cross-workspace data contamination. This means the middleware
            enforcement has a bug allowing data to be written to the wrong workspace.
            Immediate investigation required — see runbook section
            "Cross-workspace leak alert".
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-leak-alert"

      - alert: OrphanNodesDetected
        expr: rustbrain_workspace_leak_orphan_nodes - rustbrain_workspace_leak_baseline_orphan_nodes > 0
        for: 5m
        labels:
          severity: warning
          component: workspace-isolation
        annotations:
          summary: "New orphan nodes detected in Neo4j (post-migration baseline)"
          description: |
            {{ $value }} new orphan node(s) detected beyond the pre-migration
            baseline of {{ $labels.baseline }}. These nodes have zero Workspace_
            labels and may indicate a label-injection bug or pre-Phase-3 data
            that was not labeled during migration. Review during business hours.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-leak-alert"
