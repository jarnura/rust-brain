# =============================================================================
# rust-brain — Prometheus Alert Rules
# =============================================================================

groups:
  - name: rustbrain-consistency
    rules:
      - alert: ConsistencyCheckFailed
        expr: probe_http_status_code{probe="consistency"} == 503
        for: 2m
        labels:
          severity: critical
          component: consistency
        annotations:
          summary: "Cross-store consistency check failed"
          description: |
            The /health/consistency endpoint is returning HTTP 503, indicating
            data inconsistencies between Postgres, Neo4j, and Qdrant.
            Check the consistency report at http://localhost:8088/api/consistency
            and follow the recovery steps in docs/runbook.md.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-store-consistency-failure"

      - alert: ConsistencyProbeUnreachable
        expr: probe_success{probe="consistency"} == 0
        for: 5m
        labels:
          severity: warning
          component: consistency
        annotations:
          summary: "Consistency health endpoint unreachable"
          description: |
            The /health/consistency endpoint cannot be reached by the
            blackbox exporter probe. The API service may be down or
            the endpoint is not responding.

  - name: rustbrain-workspace-leak
    rules:
      - alert: CrossWorkspaceLeakDetected
        expr: rustbrain_workspace_leak_multi_label_nodes > 0
        for: 1m
        labels:
          severity: critical
          component: workspace-isolation
        annotations:
          summary: "Cross-workspace contamination detected in Neo4j"
          description: |
            {{ $value }} node(s) have multiple Workspace_ labels, indicating
            cross-workspace data contamination. This means the middleware
            enforcement has a bug allowing data to be written to the wrong workspace.
            Immediate investigation required — see runbook section
            "Cross-workspace leak alert".
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-leak-alert"

      - alert: OrphanNodesDetected
        expr: rustbrain_workspace_leak_orphan_nodes - rustbrain_workspace_leak_baseline_orphan_nodes > 0
        for: 5m
        labels:
          severity: warning
          component: workspace-isolation
        annotations:
          summary: "New orphan nodes detected in Neo4j (post-migration baseline)"
          description: |
            {{ $value }} new orphan node(s) detected beyond the pre-migration
            baseline of {{ $labels.baseline }}. These nodes have zero Workspace_
            labels and may indicate a label-injection bug or pre-Phase-3 data
            that was not labeled during migration. Review during business hours.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-leak-alert"

  - name: rustbrain-docker-leaks
    rules:
      - alert: RustbrainOrphanVolumes
        expr: rustbrain_leak_orphan_volumes_total > 0
        for: 5m
        labels:
          severity: warning
          component: docker-resources
        annotations:
          summary: "Orphaned Docker volumes detected"
          description: |
            {{ $value }} Docker volume(s) with label rustbrain.workspace=true
            exist but are not tracked in the workspaces table. These may be
            left over from failed workspace deletions or crashes. Run
            scripts/leak-detector.sh --cleanup to remove, or investigate
            via the runbook.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#docker-resource-leak-detection"

      - alert: RustbrainOrphanContainers
        expr: rustbrain_leak_orphan_containers_total > 0
        for: 5m
        labels:
          severity: warning
          component: docker-resources
        annotations:
          summary: "Orphaned Docker containers detected"
          description: |
            {{ $value }} execution container(s) named rustbrain-exec-* exist
            but are not tracked in the executions table. These may be left
            over from sweeper failures or API crashes. Run
            scripts/leak-detector.sh --cleanup to remove, or investigate
            via the runbook.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#docker-resource-leak-detection"

      - alert: RustbrainLeakDetectionStale
        expr: time() - rustbrain_leak_detection_timestamp_seconds > 3600
        for: 10m
        labels:
          severity: warning
          component: docker-resources
        annotations:
          summary: "Leak detection job has not run in over 1 hour"
          description: |
            The leak-detector.sh script has not updated its metrics in over
            1 hour. The cron job or scheduled task may have stopped running.
            Check that scripts/leak-detector.sh is scheduled and executing
            successfully.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#docker-resource-leak-detection"

      - alert: CrossWorkspaceRelationshipDetected
        expr: rustbrain_workspace_leak_cross_workspace_relationships > 0
        for: 1m
        labels:
          severity: critical
          component: workspace-isolation
        annotations:
          summary: "Cross-workspace relationships detected in Neo4j"
          description: |
            {{ $value }} relationship(s) connect nodes from different workspaces.
            This indicates a workspace isolation breach — edges should never
            cross workspace boundaries. Investigate the audit log for
            cross_workspace_relationship entries and the runbook section
            "Cross-workspace relationship and label mismatch alert".
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-relationship-and-label-mismatch-alert"

      - alert: LabelMismatchDetected
        expr: rustbrain_workspace_leak_label_mismatches > 0
        for: 5m
        labels:
          severity: warning
          component: workspace-isolation
        annotations:
          summary: "Workspace label-context mismatches detected in Neo4j"
          description: |
            {{ $value }} node(s) have a workspace label that conflicts with
            their neighbors' labels. This can indicate a mislabeled node from
            incorrect ingestion. Check the audit log for label_mismatch
            entries and the runbook for remediation steps.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-relationship-and-label-mismatch-alert"

  - name: rustbrain-workspace-audit
    rules:
      - alert: PerWorkspaceMultiLabelNodes
        expr: rustbrain_workspace_audit_multi_label_nodes > 0
        for: 1m
        labels:
          severity: critical
          component: workspace-isolation
        annotations:
          summary: "Per-workspace cross-workspace contamination detected"
          description: |
            Workspace {{ $labels.workspace }} has {{ $value }} node(s) with
            multiple Workspace_ labels, indicating cross-workspace data
            contamination. Immediate investigation required.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-leak-alert"

      - alert: PerWorkspaceCrossWorkspaceRels
        expr: rustbrain_workspace_audit_cross_workspace_relationships > 0
        for: 1m
        labels:
          severity: critical
          component: workspace-isolation
        annotations:
          summary: "Per-workspace cross-workspace relationships detected"
          description: |
            Workspace {{ $labels.workspace }} has {{ $value }} relationship(s)
            connecting nodes from different workspaces. This indicates a
            workspace isolation breach.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-relationship-and-label-mismatch-alert"

      - alert: PerWorkspaceLabelMismatches
        expr: rustbrain_workspace_audit_label_mismatches > 0
        for: 5m
        labels:
          severity: warning
          component: workspace-isolation
        annotations:
          summary: "Per-workspace label-context mismatches detected"
          description: |
            Workspace {{ $labels.workspace }} has {{ $value }} node(s) whose
            workspace label conflicts with their neighbors. This can indicate
            a mislabeled node from incorrect ingestion.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-relationship-and-label-mismatch-alert"

      - alert: PerWorkspaceOrphanNodes
        expr: rustbrain_workspace_audit_orphan_nodes > 0
        for: 5m
        labels:
          severity: warning
          component: workspace-isolation
        annotations:
          summary: "Unlabeled orphan nodes detected in Neo4j"
          description: |
            {{ $value }} node(s) have zero Workspace_ labels (orphan nodes).
            These may indicate a label-injection bug or pre-migration data
            that was not labeled.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#cross-workspace-leak-alert"

      - alert: PerWorkspaceLeakVolumes
        expr: rustbrain_workspace_audit_leak_volumes_total > 0
        for: 5m
        labels:
          severity: warning
          component: docker-resources
        annotations:
          summary: "Per-workspace orphaned Docker volumes detected"
          description: |
            Workspace {{ $labels.workspace }} has {{ $value }} orphaned
            Docker volume(s) not tracked in Postgres.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#docker-resource-leak-detection"

      - alert: PerWorkspaceLeakContainers
        expr: rustbrain_workspace_audit_leak_containers_total > 0
        for: 5m
        labels:
          severity: warning
          component: docker-resources
        annotations:
          summary: "Per-workspace orphaned Docker containers detected"
          description: |
            Workspace {{ $labels.workspace }} has {{ $value }} orphaned
            Docker container(s) not tracked in Postgres.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#docker-resource-leak-detection"

  - name: rustbrain-ingestion
    rules:
      - alert: IngestionContainerOOMKilled
        expr: container_oom_events_total{container_name="rustbrain-ingestion"} > 0
        for: 0m
        labels:
          severity: critical
          component: ingestion
        annotations:
          summary: "Ingestion container was OOM killed"
          description: |
            The ingestion container (rustbrain-ingestion) was killed due to
            out-of-memory conditions. The 32GB memory limit may be insufficient
            for the workload. Consider increasing INGESTION_MEMORY_BUDGET or
            reducing EMBED_BATCH_SIZE / PARALLEL_JOBS in .env.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#ingestion-oom-with-large-crates"

      - alert: IngestionMemoryHigh
        expr: container_memory_usage_bytes{container_name="rustbrain-ingestion"} / container_spec_memory_limit_bytes{container_name="rustbrain-ingestion"} > 0.85
        for: 5m
        labels:
          severity: warning
          component: ingestion
        annotations:
          summary: "Ingestion container using >85% of memory budget"
          description: |
            The ingestion container is using {{ $value | humanizePercentage }}
            of its 32GB memory limit. If it continues growing, it may be
            OOM killed. Consider reducing batch sizes or parallelism.
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#ingestion-oom-with-large-crates"

      - alert: IngestionContainerRestarting
        expr: increase(container_restart_count_total{container_name="rustbrain-ingestion"}[10m]) > 0
        for: 1m
        labels:
          severity: critical
          component: ingestion
        annotations:
          summary: "Ingestion container is restarting"
          description: |
            The ingestion container has restarted {{ $value }} time(s) in the
            last 10 minutes. This likely indicates a crash (possibly OOM).
            Check container logs: docker compose logs ingestion --tail=100
          runbook_url: "https://github.com/jarnura/rust-brain/blob/main/docs/runbook.md#ingestion-oom-with-large-crates"
