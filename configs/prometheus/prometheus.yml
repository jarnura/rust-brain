# =============================================================================
# rust-brain — Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'rustbrain'

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  # ===========================================================================
  # rust-brain MCP Server
  # ===========================================================================
  
  - job_name: 'rustbrain-mcp'
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'mcp-server'
          component: 'tool-api'
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
    scheme: http

  # Legacy alias for backwards compatibility
  - job_name: 'rustbrain-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics
    scrape_interval: 30s

  # ===========================================================================
  # Infrastructure
  # ===========================================================================

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'consistency-health'
    metrics_path: /probe
    params:
      module: [http_consistency]
    static_configs:
      - targets:
          - http://api:8080/health/consistency
        labels:
          service: 'api'
          probe: 'consistency'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Audit service — workspace leak detection metrics
  - job_name: 'rustbrain-audit'
    static_configs:
      - targets: ['audit:8090']
    metrics_path: /metrics
    scrape_interval: 30s

  # Ingestion service — pipeline metrics (when running)
  - job_name: 'rustbrain-ingestion'
    static_configs:
      - targets: ['ingestion:9091']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
