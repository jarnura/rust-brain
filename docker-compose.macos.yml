# =============================================================================
# macOS / No-GPU Override
# =============================================================================
#
# Docker Desktop for macOS (and Linux without NVIDIA) does not support
# GPU passthrough. The !reset tag completely replaces the deploy key,
# removing the nvidia device reservation from the main docker-compose.yml.
#
# Usage:
#   cp docker-compose.macos.yml docker-compose.override.yml
#
# Auto-applied by run-with-snapshot.sh and ingest.sh on macOS (uname -s = Darwin).
# =============================================================================

services:
  ollama:
    deploy: !reset
      resources:
        limits:
          memory: 16G
