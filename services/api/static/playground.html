<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rust-brain Playground</title>

  <!-- CDN: D3.js v7 -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <!-- CDN: highlight.js with Rust, JSON, SQL, TOML -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/ini.min.js"></script>

  <!-- CDN: marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <!-- Local styles -->
  <link rel="stylesheet" href="css/playground.css">
</head>
<body>
  <!-- Command Palette Overlay -->
  <div id="cmd-palette" class="cmd-palette" role="dialog" aria-label="Command palette" hidden>
    <div class="cmd-palette__backdrop"></div>
    <div class="cmd-palette__modal">
      <input id="cmd-input" class="cmd-palette__input" type="text" placeholder="Search tabs, actions…" autocomplete="off">
      <ul id="cmd-list" class="cmd-palette__list" role="listbox"></ul>
    </div>
  </div>

  <!-- App Shell: sidebar + main + detail -->
  <div class="app-shell" id="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__logo">🧠</span>
        <span class="sidebar__title">rust-brain</span>
        <button class="sidebar__toggle" id="sidebar-toggle" title="Collapse sidebar (Cmd+/)">‹</button>
      </div>

      <nav class="sidebar__nav" id="sidebar-nav">
        <button class="sidebar__item active" data-tab="dashboard">
          <span class="sidebar__icon">⊞</span><span class="sidebar__label">Dashboard</span>
        </button>
        <button class="sidebar__item" data-tab="search">
          <span class="sidebar__icon">⌕</span><span class="sidebar__label">Search</span>
        </button>
        <button class="sidebar__item" data-tab="callgraph">
          <span class="sidebar__icon">⬡</span><span class="sidebar__label">Call Graph</span>
        </button>
        <button class="sidebar__item" data-tab="chat">
          <span class="sidebar__icon">◉</span><span class="sidebar__label">Chat</span>
        </button>
        <button class="sidebar__item" data-tab="cypher">
          <span class="sidebar__icon">⌥</span><span class="sidebar__label">Cypher</span>
        </button>
        <button class="sidebar__item" data-tab="types">
          <span class="sidebar__icon">T</span><span class="sidebar__label">Types</span>
        </button>
        <button class="sidebar__item" data-tab="traits">
          <span class="sidebar__icon">◈</span><span class="sidebar__label">Traits</span>
        </button>
        <button class="sidebar__item" data-tab="modules">
          <span class="sidebar__icon">⊟</span><span class="sidebar__label">Modules</span>
        </button>
        <button class="sidebar__item" data-tab="audit">
          <span class="sidebar__icon">≡</span><span class="sidebar__label">Audit</span>
        </button>
        <button class="sidebar__item" data-tab="gaps">
          <span class="sidebar__icon">△</span><span class="sidebar__label">Gaps</span>
        </button>
      </nav>

      <div class="sidebar__footer">
        <span id="sidebar-status" class="status-dot status-unknown"></span>
        <span class="sidebar__status-label" id="sidebar-status-label">Connecting…</span>
      </div>
    </aside>

    <!-- Resizer: sidebar ↔ main -->
    <div class="resizer resizer--left" id="resizer-left" title="Drag to resize"></div>

    <!-- Main Panel -->
    <main class="main-panel" id="main-panel">
      <!-- Tab Bar -->
      <div class="tab-bar" id="tab-bar" role="tablist">
        <button class="tab-bar__tab active" role="tab" data-tab="dashboard" aria-selected="true">Dashboard</button>
        <button class="tab-bar__tab" role="tab" data-tab="search" aria-selected="false">Search</button>
        <button class="tab-bar__tab" role="tab" data-tab="callgraph" aria-selected="false">Call Graph</button>
        <button class="tab-bar__tab" role="tab" data-tab="chat" aria-selected="false">Chat</button>
        <button class="tab-bar__tab" role="tab" data-tab="cypher" aria-selected="false">Cypher</button>
        <button class="tab-bar__tab" role="tab" data-tab="types" aria-selected="false">Types</button>
        <button class="tab-bar__tab" role="tab" data-tab="traits" aria-selected="false">Traits</button>
        <button class="tab-bar__tab" role="tab" data-tab="modules" aria-selected="false">Modules</button>
        <button class="tab-bar__tab" role="tab" data-tab="audit" aria-selected="false">Audit</button>
        <button class="tab-bar__tab" role="tab" data-tab="gaps" aria-selected="false">Gaps</button>
        <div class="tab-bar__spacer"></div>
        <kbd class="tab-bar__hint" title="Open command palette">⌘K</kbd>
      </div>

      <!-- Tab Content -->
      <div class="tab-content" id="tab-content">
        <!-- Populated by playground.js components -->
        <div class="tab-pane active" id="pane-dashboard" role="tabpanel"></div>
        <div class="tab-pane" id="pane-search"    role="tabpanel"></div>
        <div class="tab-pane" id="pane-callgraph" role="tabpanel"></div>
        <div class="tab-pane" id="pane-chat"      role="tabpanel"></div>
        <div class="tab-pane" id="pane-cypher"    role="tabpanel"></div>
        <div class="tab-pane" id="pane-types"     role="tabpanel"></div>
        <div class="tab-pane" id="pane-traits"    role="tabpanel"></div>
        <div class="tab-pane" id="pane-modules"   role="tabpanel"></div>
        <div class="tab-pane" id="pane-audit"     role="tabpanel"></div>
        <div class="tab-pane" id="pane-gaps"      role="tabpanel"></div>
      </div>
    </main>

    <!-- Resizer: main ↔ detail -->
    <div class="resizer resizer--right" id="resizer-right" title="Drag to resize"></div>

    <!-- Detail Panel -->
    <aside class="detail-panel" id="detail-panel">
      <div class="detail-panel__header">
        <span class="detail-panel__title" id="detail-title">Detail</span>
        <button class="detail-panel__close" id="detail-close" title="Close detail">✕</button>
      </div>
      <div class="detail-panel__body" id="detail-body">
        <p class="detail-panel__empty">Select an item to inspect it.</p>
      </div>
    </aside>
  </div>

  <!-- Local JS (module) -->
  <script type="module" src="js/playground.js"></script>
</body>
</html>
