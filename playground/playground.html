<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Brain - Query Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            50:  '#fafafa',
                            100: '#fafafa',
                            200: '#e4e4e7',
                            300: '#d4d4d8',
                            400: '#a1a1aa',
                            500: '#71717a',
                            600: '#444444',
                            700: '#333333',
                            800: '#222222',
                            900: '#111111',
                            950: '#0a0a0a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark-950 text-dark-100 min-h-screen font-sans">
    <!-- Navigation -->
    <nav class="bg-dark-900 border-b border-dark-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <span class="text-2xl">🧠</span>
                        <span class="ml-2 text-xl font-bold text-white">Rust Brain</span>
                    </div>
                <!-- Mobile hamburger (hidden md+) -->
                    <details class="nav-mobile-details md:hidden ml-3">
                        <summary class="nav-mobile-summary" aria-label="Open navigation">☰</summary>
                        <nav class="nav-mobile-dropdown">
                            <a href="index.html">Dashboard</a>
                            <a href="playground.html" class="active-page">Query</a>
                            <a href="audit.html">Audit Trail</a>
                            <a href="gaps.html">Gap Analysis</a>
                            <a href="benchmarker.html">Benchmarker</a>
                        </nav>
                    </details>

                    <div class="hidden md:block ml-10">
                        <div class="flex items-baseline space-x-4">
                            <a href="index.html" class="text-dark-300 hover:bg-dark-800 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                            <a href="playground.html" class="bg-dark-800 text-white px-3 py-2 rounded-md text-sm font-medium">Query</a>
                            <a href="audit.html" class="text-dark-300 hover:bg-dark-800 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Audit Trail</a>
                            <a href="gaps.html" class="text-dark-300 hover:bg-dark-800 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Gap Analysis</a>
                            <a href="benchmarker.html" class="text-dark-300 hover:bg-dark-800 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Benchmarker</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Query Configuration -->
            <div class="lg:col-span-1">
                <div class="bg-dark-800 rounded-lg p-6 lg:sticky lg:top-6">
                    <h2 class="text-lg font-semibold text-dark-100 mb-4">Query Configuration</h2>
                    
                    <!-- Query Type Selector -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-dark-300 mb-2">Query Type</label>
                        <select id="queryType" onchange="updateParameterFields()" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                            <option value="semantic">Semantic Search</option>
                            <option value="function">Get Function</option>
                            <option value="callers">Get Callers</option>
                            <option value="trait">Get Trait Implementations</option>
                            <option value="usages">Find Type Usages</option>
                            <option value="module">Get Module Tree</option>
                            <option value="graph">Custom Graph Query</option>
                        </select>
                    </div>

                    <!-- Dynamic Parameter Fields -->
                    <div id="parameterFields" class="space-y-4">
                        <!-- Fields will be populated by JS -->
                    </div>

                    <!-- Execute Button -->
                    <div class="mt-6 space-y-3">
                        <button onclick="executeQuery()" id="executeBtn" class="w-full bg-indigo-500 hover:bg-indigo-400 active:bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center justify-center">
                            <svg class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            Execute Query
                        </button>
                        <button onclick="clearResults()" class="w-full bg-dark-700 hover:bg-dark-600 text-dark-300 px-4 py-2 rounded-md text-sm font-medium transition-colors">
                            Clear Results
                        </button>
                    </div>

                    <!-- Query Examples -->
                    <div class="mt-6 pt-6 border-t border-dark-700">
                        <h3 class="text-sm font-medium text-dark-300 mb-3">Quick Examples</h3>
                        <div class="space-y-2">
                            <button onclick="loadExample('semantic')" class="w-full text-left text-xs bg-dark-700 hover:bg-dark-600 px-3 py-2 rounded text-dark-300 transition-colors">
                                🔍 Search for "serialize function"
                            </button>
                            <button onclick="loadExample('callers')" class="w-full text-left text-xs bg-dark-700 hover:bg-dark-600 px-3 py-2 rounded text-dark-300 transition-colors">
                                📞 Get callers of a function
                            </button>
                            <button onclick="loadExample('trait')" class="w-full text-left text-xs bg-dark-700 hover:bg-dark-600 px-3 py-2 rounded text-dark-300 transition-colors">
                                🎯 Find Serialize implementations
                            </button>
                            <button onclick="loadExample('graph')" class="w-full text-left text-xs bg-dark-700 hover:bg-dark-600 px-3 py-2 rounded text-dark-300 transition-colors">
                                📊 Custom Cypher query
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Results Area -->
            <div class="lg:col-span-2">
                <!-- Status Bar -->
                <div class="bg-dark-800 rounded-lg p-4 mb-4 flex flex-wrap items-center justify-between gap-2">
                    <div class="flex items-center space-x-4">
                        <span id="queryStatus" class="text-sm text-dark-400">Ready</span>
                        <span id="queryTime" class="text-sm text-dark-500"></span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button onclick="copyResults()" class="text-dark-400 hover:text-dark-100 px-3 py-1 rounded text-sm transition-colors" title="Copy to clipboard">
                            📋 Copy
                        </button>
                        <button onclick="downloadResults()" class="text-dark-400 hover:text-dark-100 px-3 py-1 rounded text-sm transition-colors" title="Download as JSON">
                            💾 Export
                        </button>
                    </div>
                </div>

                <!-- Results Display -->
                <div class="bg-dark-800 rounded-lg">
                    <div class="border-b border-dark-700 px-4 py-3 flex items-center justify-between">
                        <h3 class="text-sm font-medium text-dark-300">Results</h3>
                        <div class="flex items-center space-x-2">
                            <button onclick="setView('json')" id="viewJson" class="px-2 py-1 text-xs rounded bg-dark-700 text-dark-300 hover:text-white">JSON</button>
                            <button onclick="setView('table')" id="viewTable" class="px-2 py-1 text-xs rounded text-dark-500 hover:text-white">Table</button>
                        </div>
                    </div>
                    <div id="resultsContainer" class="p-4 min-h-[400px] max-h-[600px] overflow-auto">
                        <div class="text-center text-dark-500 py-12">
                            <svg class="mx-auto h-12 w-12 text-dark-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <p class="mt-4">Configure your query and click Execute</p>
                        </div>
                    </div>
                </div>

                <!-- Query History -->
                <div class="mt-4 bg-dark-800 rounded-lg p-4">
                    <h3 class="text-sm font-medium text-dark-300 mb-3">Query History</h3>
                    <div id="queryHistory" class="space-y-2 max-h-40 overflow-auto">
                        <p class="text-xs text-dark-500">No queries executed yet</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        let currentResults = null;
        let currentView = 'json';
        let queryHistory = [];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            updateParameterFields();
            try {
                const workspaces = await API.listWorkspaces();
                if (Array.isArray(workspaces) && workspaces.length > 0) {
                    setActiveWorkspace(workspaces[0].id);
                }
            } catch {}
        });

        function updateParameterFields() {
            const type = document.getElementById('queryType').value;
            const container = document.getElementById('parameterFields');
            
            const fields = {
                semantic: `
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Search Query</label>
                        <input type="text" id="query" placeholder="e.g., serialize function" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Limit</label>
                        <input type="number" id="limit" value="10" min="1" max="100" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Score Threshold (optional)</label>
                        <input type="number" id="scoreThreshold" placeholder="0.0 - 1.0" step="0.1" min="0" max="1" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                `,
                function: `
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Fully Qualified Name (FQN)</label>
                        <input type="text" id="fqn" placeholder="e.g., serde::ser::to_string" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                `,
                callers: `
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Function FQN</label>
                        <input type="text" id="fqn" placeholder="e.g., my_crate::module::function" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Depth</label>
                        <input type="number" id="depth" value="1" min="1" max="10" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                `,
                trait: `
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Trait Name</label>
                        <input type="text" id="traitName" placeholder="e.g., Serialize, Clone, Debug" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Limit</label>
                        <input type="number" id="limit" value="10" min="1" max="100" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                `,
                usages: `
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Type Name</label>
                        <input type="text" id="typeName" placeholder="e.g., Result, Option, Vec" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Limit</label>
                        <input type="number" id="limit" value="10" min="1" max="100" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                `,
                module: `
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Crate Name</label>
                        <input type="text" id="crateName" placeholder="e.g., serde, tokio, my_crate" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                `,
                graph: `
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Cypher Query</label>
                        <textarea id="cypherQuery" rows="5" placeholder="MATCH (n:Function) RETURN n.fqn, n.name LIMIT 10" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500 font-mono text-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-300 mb-2">Limit</label>
                        <input type="number" id="limit" value="10" min="1" max="100" class="w-full bg-dark-700 border border-dark-600 rounded-md px-3 py-2 text-dark-100 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div class="p-3 bg-dark-700 rounded-md">
                        <p class="text-xs text-dark-400">💡 Only read-only queries are allowed (MATCH, RETURN)</p>
                    </div>
                `
            };

            container.innerHTML = fields[type] || '';
        }

        async function executeQuery() {
            const type = document.getElementById('queryType').value;
            const btn = document.getElementById('executeBtn');
            const status = document.getElementById('queryStatus');
            const timeDisplay = document.getElementById('queryTime');
            
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Executing...`;
            status.textContent = 'Executing...';
            timeDisplay.textContent = '';
            
            const startTime = performance.now();
            
            try {
                let result;
                let endpoint;
                let params = {};
                let method = 'GET';

                switch (type) {
                    case 'semantic':
                        endpoint = '/tools/search_semantic';
                        method = 'POST';
                        params = {
                            query: document.getElementById('query')?.value || '',
                            limit: parseInt(document.getElementById('limit')?.value || '10'),
                            score_threshold: document.getElementById('scoreThreshold')?.value ? parseFloat(document.getElementById('scoreThreshold').value) : null
                        };
                        break;
                    case 'function':
                        endpoint = '/tools/get_function';
                        params = { fqn: document.getElementById('fqn')?.value || '' };
                        break;
                    case 'callers':
                        endpoint = '/tools/get_callers';
                        params = { 
                            fqn: document.getElementById('fqn')?.value || '',
                            depth: parseInt(document.getElementById('depth')?.value || '1')
                        };
                        break;
                    case 'trait':
                        endpoint = '/tools/get_trait_impls';
                        params = { 
                            trait_name: document.getElementById('traitName')?.value || '',
                            limit: parseInt(document.getElementById('limit')?.value || '10')
                        };
                        break;
                    case 'usages':
                        endpoint = '/tools/find_usages_of_type';
                        params = { 
                            type_name: document.getElementById('typeName')?.value || '',
                            limit: parseInt(document.getElementById('limit')?.value || '10')
                        };
                        break;
                    case 'module':
                        endpoint = '/tools/get_module_tree';
                        params = { crate_name: document.getElementById('crateName')?.value || '' };
                        break;
                    case 'graph':
                        endpoint = '/tools/query_graph';
                        method = 'POST';
                        params = {
                            query: document.getElementById('cypherQuery')?.value || '',
                            limit: parseInt(document.getElementById('limit')?.value || '10')
                        };
                        break;
                }

                // Remove null/empty values
                Object.keys(params).forEach(key => {
                    if (params[key] === null || params[key] === undefined || params[key] === '') {
                        delete params[key];
                    }
                });

                const options = { method };
                if (method === 'POST') {
                    options.body = JSON.stringify(params);
                }

                const url = method === 'GET' 
                    ? `${endpoint}?${new URLSearchParams(params)}` 
                    : endpoint;

                result = await fetchAPI(url, options);
                currentResults = result;
                
                const elapsed = performance.now() - startTime;
                timeDisplay.textContent = `${elapsed.toFixed(0)}ms`;
                status.textContent = `Success (${type})`;
                status.className = 'text-sm text-green-400';
                
                // Add to history
                addToHistory(type, params, elapsed);
                
                // Display results
                renderResults();
                
            } catch (error) {
                const elapsed = performance.now() - startTime;
                timeDisplay.textContent = `${elapsed.toFixed(0)}ms`;
                status.textContent = `Error: ${error.message}`;
                status.className = 'text-sm text-red-400';
                currentResults = { error: error.message };
                renderResults();
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Execute Query`;
            }
        }

        function renderResults() {
            const container = document.getElementById('resultsContainer');
            
            if (!currentResults) {
                container.innerHTML = `<div class="text-center text-dark-500 py-12">No results</div>`;
                return;
            }

            if (currentView === 'json') {
                container.innerHTML = `<pre class="text-sm text-dark-200 font-mono whitespace-pre-wrap">${syntaxHighlight(JSON.stringify(currentResults, null, 2))}</pre>`;
            } else {
                container.innerHTML = renderTable(currentResults);
            }
        }

        function renderTable(data) {
            if (data.error) {
                return `<div class="text-red-400 p-4">${escapeHtml(data.error)}</div>`;
            }

            // Extract array from common response structures
            let items = [];
            if (Array.isArray(data.results)) {
                items = data.results;
            } else if (Array.isArray(data)) {
                items = data;
            } else if (data.callers) {
                items = data.callers;
            } else if (data.implementations) {
                items = data.implementations;
            } else if (data.usages) {
                items = data.usages;
            } else {
                return `<pre class="text-sm text-dark-200 font-mono whitespace-pre-wrap">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
            }

            if (items.length === 0) {
                return `<div class="text-dark-500 p-4">No results found</div>`;
            }

            // Get all unique keys
            const keys = [...new Set(items.flatMap(item => 
                typeof item === 'object' ? Object.keys(item) : ['value']
            ))];

            return `
                <table class="min-w-full divide-y divide-dark-700">
                    <thead>
                        <tr>
                            ${keys.map(k => `<th class="px-4 py-2 text-left text-xs font-medium text-dark-400 uppercase">${escapeHtml(k)}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-dark-700">
                        ${items.map(item => `
                            <tr class="hover:bg-dark-700">
                                ${keys.map(k => {
                                    const val = typeof item === 'object' ? item[k] : item;
                                    const display = typeof val === 'object' ? JSON.stringify(val) : val;
                                    return `<td class="px-4 py-2 text-sm text-dark-300">${escapeHtml(display ?? '-')}</td>`;
                                }).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function setView(view) {
            currentView = view;
            document.getElementById('viewJson').className = view === 'json' 
                ? 'px-2 py-1 text-xs rounded bg-dark-700 text-dark-300 hover:text-white' 
                : 'px-2 py-1 text-xs rounded text-dark-500 hover:text-white';
            document.getElementById('viewTable').className = view === 'table' 
                ? 'px-2 py-1 text-xs rounded bg-dark-700 text-dark-300 hover:text-white' 
                : 'px-2 py-1 text-xs rounded text-dark-500 hover:text-white';
            renderResults();
        }

        function syntaxHighlight(json) {
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
                let cls = 'text-orange-400'; // number
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'text-blue-400'; // key
                    } else {
                        cls = 'text-green-400'; // string
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'text-purple-400'; // boolean
                } else if (/null/.test(match)) {
                    cls = 'text-dark-500'; // null
                }
                return `<span class="${cls}">${escapeHtml(match)}</span>`;
            });
        }

        function addToHistory(type, params, elapsed) {
            const query = type === 'semantic' ? params.query :
                         type === 'graph' ? params.query :
                         params.fqn || params.trait_name || params.type_name || params.crate_name || '';
            
            queryHistory.unshift({ type, query, elapsed, timestamp: new Date() });
            if (queryHistory.length > 10) queryHistory.pop();
            
            const container = document.getElementById('queryHistory');
            container.innerHTML = queryHistory.map((h, i) => `
                <button onclick="rerunQuery(${i})" class="w-full text-left text-xs bg-dark-700 hover:bg-dark-600 px-3 py-2 rounded flex items-center justify-between transition-colors">
                    <span class="text-dark-300 truncate">${escapeHtml(h.type)}: ${escapeHtml(h.query)}</span>
                    <span class="text-dark-500 ml-2">${h.elapsed.toFixed(0)}ms</span>
                </button>
            `).join('');
        }

        function rerunQuery(index) {
            const h = queryHistory[index];
            document.getElementById('queryType').value = h.type;
            updateParameterFields();
            
            // Populate the appropriate field
            const queryInput = document.getElementById('query') || 
                              document.getElementById('fqn') || 
                              document.getElementById('traitName') ||
                              document.getElementById('typeName') ||
                              document.getElementById('crateName') ||
                              document.getElementById('cypherQuery');
            if (queryInput) queryInput.value = h.query;
            
            executeQuery();
        }

        function loadExample(type) {
            document.getElementById('queryType').value = type;
            updateParameterFields();
            
            setTimeout(() => {
                switch (type) {
                    case 'semantic':
                        document.getElementById('query').value = 'serialize function';
                        break;
                    case 'callers':
                        document.getElementById('fqn').value = 'serde::ser::to_string';
                        document.getElementById('depth').value = '2';
                        break;
                    case 'trait':
                        document.getElementById('traitName').value = 'Serialize';
                        break;
                    case 'graph':
                        document.getElementById('cypherQuery').value = 'MATCH (n:Function) WHERE n.visibility = "pub" RETURN n.fqn, n.name LIMIT 10';
                        break;
                }
            }, 50);
        }

        function clearResults() {
            currentResults = null;
            document.getElementById('resultsContainer').innerHTML = `
                <div class="text-center text-dark-500 py-12">
                    <svg class="mx-auto h-12 w-12 text-dark-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <p class="mt-4">Configure your query and click Execute</p>
                </div>
            `;
            document.getElementById('queryStatus').textContent = 'Ready';
            document.getElementById('queryTime').textContent = '';
        }

        function copyResults() {
            if (!currentResults) {
                showNotification('No results to copy', 'warning');
                return;
            }
            navigator.clipboard.writeText(JSON.stringify(currentResults, null, 2));
            showNotification('Results copied to clipboard', 'success');
        }

        function downloadResults() {
            if (!currentResults) {
                showNotification('No results to download', 'warning');
                return;
            }
            const blob = new Blob([JSON.stringify(currentResults, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `query-result-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showNotification('Results downloaded', 'success');
        }
    </script>
</body>
</html>
